name: Frontend Tests
run-name: Frontend tests — PR #${{ github.event.pull_request.number || github.ref_name }}

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-tests.yml"
  push:
    branches: ["main"]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-tests.yml"

jobs:
  test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npm run test:run
